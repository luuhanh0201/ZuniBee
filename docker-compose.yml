# Deploy: cấu hình domain/mật khẩu trong .env (copy từ .env.example) rồi chạy:
#   docker compose up -d --build
#   docker compose --profile tools run --rm migrate   # chạy migration lần đầu / sau mỗi lần thêm migration
#
# Postgres/Redis không publish port ra host. "web", "api" và "pgadmin" chỉ
# publish trên 127.0.0.1 để một ingress bên thứ ba (Cloudflare Tunnel / reverse
# proxy / LB) đảm nhận HTTPS + định tuyến.

services:
  postgres:
    # Pin theo digest để lần pull sau không tự đổi phiên bản; bump thủ công
    # định kỳ để nhận bản vá bảo mật.
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-zunibee}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-zunibee}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 512m

  pgadmin:
    image: dpage/pgadmin4:9.16@sha256:40fa840c5bb7c8463957f1255b01283732c2d8c9396a956d180f8e6c296753b3
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    ports:
      - "127.0.0.1:5050:5050"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
      PGADMIN_DISABLE_POSTFIX: "true"
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_SESSION_COOKIE_SECURE: "True"
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://127.0.0.1:5050/misc/ping",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          memory: 384m

  redis:
    image: redis:8.8.0-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 1280m

  api:
    image: zunibee-api:latest
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    # Publish trên 127.0.0.1 để ingress bên thứ ba trên host tiếp cận (không lộ
    # ra internet). Dùng LB ngoài thì đổi sang 0.0.0.0 kèm firewall/security group.
    ports:
      - "127.0.0.1:2223:2223"
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      APP_PORT: 2223
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-zunibee}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_PROVIDER_ENCRYPTION_KEY: ${AI_PROVIDER_ENCRYPTION_KEY:-}
      AI_PROVIDER_ENCRYPTION_KEY_FILE: /app/apps/api/secrets/ai-provider-encryption-key
      AI_PROVIDER_PRIVATE_HOST_ALLOWLIST: ${AI_PROVIDER_PRIVATE_HOST_ALLOWLIST:-}
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      AI_GENERATION_WORKER_ENABLED: "false"
      WEB_URL: https://${DOMAIN}
    volumes:
      - api-uploads:/app/apps/api/uploads
      - api-protected-uploads:/app/apps/api/protected-uploads
      - api-secrets:/app/apps/api/secrets
    # Dùng node (đã có sẵn trong image) để không phụ thuộc curl/wget.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:2223/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          memory: 512m

  ai-worker:
    image: zunibee-api:latest
    restart: unless-stopped
    read_only: true
    command: ["node", "dist/worker.js"]
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-zunibee}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_PROVIDER_ENCRYPTION_KEY: ${AI_PROVIDER_ENCRYPTION_KEY:-}
      AI_PROVIDER_ENCRYPTION_KEY_FILE: /app/apps/api/secrets/ai-provider-encryption-key
      AI_PROVIDER_PRIVATE_HOST_ALLOWLIST: ${AI_PROVIDER_PRIVATE_HOST_ALLOWLIST:-}
      AI_GENERATION_WORKER_ENABLED: "true"
      AI_GENERATION_WORKER_CONCURRENCY: ${AI_GENERATION_WORKER_CONCURRENCY:-1}
      NOTIFICATION_WORKER_ENABLED: "false"
      WEB_URL: https://${DOMAIN}
    volumes:
      - api-protected-uploads:/app/apps/api/protected-uploads
      - api-secrets:/app/apps/api/secrets
      - ai-worker-tmp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          memory: 1536m

  # One-off: chạy migration TypeORM trên image "api" đã build (không tự chạy khi start).
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    profiles: ["tools"]
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-zunibee}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    command:
      [
        "node_modules/.bin/typeorm",
        "migration:run",
        "-d",
        "dist/database/data-source.js",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:1112:1112"
    environment:
      PORT: 1112
    # Next.js standalone không có route health riêng — chỉ cần xác nhận server
    # đã lắng nghe (mọi phản hồi HTTP = sống; connection refused = chưa sẵn sàng).
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:1112/',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [edge]
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  internal:
    internal: true
  edge:

volumes:
  postgres-data:
  pgadmin-data:
  redis-data:
  api-uploads:
  api-protected-uploads:
  api-secrets:
  ai-worker-tmp:
