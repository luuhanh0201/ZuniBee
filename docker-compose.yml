# Deploy: cấu hình domain/mật khẩu trong .env (copy từ .env.example) rồi chạy:
#   docker compose up -d --build
#   docker compose --profile tools run --rm migrate   # chạy migration lần đầu / sau mỗi lần thêm migration
#
# Postgres/Redis không publish port ra host — chỉ "api" và "caddy" mới cần được truy cập
# từ bên ngoài network nội bộ, giảm bề mặt tấn công.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-zunibee}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-zunibee}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 160m

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      APP_PORT: 2223
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-zunibee}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AI_PROVIDER_ENCRYPTION_KEY: ${AI_PROVIDER_ENCRYPTION_KEY:?AI_PROVIDER_ENCRYPTION_KEY is required}
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      WEB_URL: https://${DOMAIN}
    volumes:
      - api-uploads:/app/apps/api/uploads
      - api-protected-uploads:/app/apps/api/protected-uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          memory: 512m

  # One-off: chạy migration TypeORM trên image "api" đã build (không tự chạy khi start).
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    profiles: ["tools"]
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-zunibee}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    command:
      [
        "node_modules/.bin/typeorm",
        "migration:run",
        "-d",
        "dist/database/data-source.js",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api/v1
    restart: unless-stopped
    environment:
      PORT: 1112
    networks: [edge]
    deploy:
      resources:
        limits:
          memory: 512m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
    volumes:
      - ./infrastructure/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, api]
    networks: [edge]
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  internal:
  edge:

volumes:
  postgres-data:
  redis-data:
  api-uploads:
  api-protected-uploads:
  caddy-data:
  caddy-config:
